format = "$character"
right_format = "$directory$git_branch$git_status"

[directory]
truncation_length = 3
truncate_to_repo = false
style = "blue"

[git_branch]
format = "[$branch]($style) "
style = "purple"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "red"

[character]
success_symbol = "[\\$](white)"
error_symbol = "[\\$](red)"
